<!DOCTYPE html>
<html lang="hr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Galerija slika na temu glazbe - prikaz fotografija uz lightbox efekt">
	<link rel="stylesheet" href="style/style.css">
	<link rel="stylesheet" href="style/style_slike.css">
	<title>Glazba - Galerija slika</title>
</head>
<body>

	<header role="banner">
		<h1>Glazba</h1>
	</header>

	<!-- Navigacija sa ARIA atributima za pristupačnost -->
	<nav aria-label="Primarna navigacija" role="navigation">
		<input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox" aria-hidden="true">
		<label for="nav-toggle" class="nav-toggle-btn" aria-label="Otvori navigacijski izbornik">&#9776; Menu</label>
		<ul class="nav-menu" role="list">
			<li role="listitem"><a href="index.html">Početna</a></li>
			<li role="listitem"><a href="slike.html" aria-current="page">Slike</a></li>
			<li role="listitem"><a href="grafikon.html">Grafikon</a></li>
		</ul>
	</nav>

	<!-- Glavna sekcija s galerijom -->
	<main role="main">
		<section class="galerija" aria-labelledby="galerija-naslov" role="region">
			<h1 id="galerija-naslov">Galerija slika</h1>
			<p class="galerija-opis">Kliknite na sliku za prikaz u punoj veličini.</p>

			<!-- 
				CSS-only Lightbox implementacija:
				Svaka slika ima:
				1. <a> s href="#lightbox-N" koji otvara overlay
				2. Overlay div s id="lightbox-N" koji se prikazuje kad je :target aktivan
				3. <a href="#"> za zatvaranje (close) - bez JavaScripta
				
				Promijenjene značajke u odnosu na predložak style_slike.css:
				1. Dodan hover efekt s overlay tekstom (figcaption vidljiv na hover)
				2. Dodan border-radius povećan na 12px umjesto 10px
			-->

			<div class="img-gallery-magnific" id="galerija-kontejner" role="list" aria-label="Galerija fotografija">
			</div>
			<!-- Kraj .img-gallery-magnific -->

			<script>
				// Zadatak 3: Dinamičko generiranje galerije pomoću JavaScript petlje (1 do 15)
				const kontejner = document.getElementById('galerija-kontejner');

				for (let i = 1; i <= 15; i++) {
					// Kreiranje figure elementa (thumbnail)
					const figure = document.createElement('figure');
					figure.className = 'galerija_slika magnific-img';
					figure.setAttribute('role', 'listitem');
					figure.innerHTML = `
						<a href="#lightbox-${i}" aria-label="Otvori sliku ${i} u punoj veličini">
							<img src="https://unsplash.it/300/200?random=${i}"
								 alt="Glazbena fotografija ${i}"
								 loading="lazy"
								 width="300" height="200">
						</a>
						<figcaption>Slika ${i}</figcaption>
					`;

					// Kreiranje lightbox overlay elementa
					const lightbox = document.createElement('div');
					lightbox.id = `lightbox-${i}`;
					lightbox.className = 'lightbox';
					lightbox.setAttribute('role', 'dialog');
					lightbox.setAttribute('aria-modal', 'true');
					lightbox.setAttribute('aria-label', `Slika ${i} u punoj veličini`);
					lightbox.innerHTML = `
						<a href="#" class="lightbox-zatvori" aria-label="Zatvori prikaz slike">&times;</a>
						<img src="https://unsplash.it/900/600?random=${i}" alt="Glazbena fotografija ${i} - puna veličina" loading="lazy">
						<p class="lightbox-naslov">Slika ${i}</p>
					`;

					kontejner.appendChild(figure);
					kontejner.appendChild(lightbox);
				}
			</script>

		</section>
	</main>

	<footer role="contentinfo">
		<p>&copy; 2025. Web Programiranje. Sva prava pridržana.</p>
	</footer>

</body>
</html>
